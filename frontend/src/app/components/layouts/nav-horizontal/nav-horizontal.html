<nav
    class="layout-navbar container-xxl navbar navbar-expand-xl navbar-detached align-items-center bg-navbar-theme"
    id="layout-navbar">
    <div class="layout-menu-toggle navbar-nav align-items-xl-center me-4 me-xl-0 d-xl-none">
        <a class="nav-item nav-link px-0 me-xl-6" href="javascript:void(0)">
        <i class="ri-menu-fill ri-22px"></i>
        </a>
    </div>

    <div class="navbar-nav-right d-flex align-items-center" id="navbar-collapse">

        <ul class="navbar-nav flex-row align-items-center ms-auto">

            <!-- Notification -->
            <li class="nav-item dropdown-notifications navbar-dropdown dropdown me-4 me-xl-1">
                <a
                class="nav-link btn btn-text-secondary rounded-pill btn-icon dropdown-toggle hide-arrow"
                href="javascript:void(0);"
                data-bs-toggle="dropdown"
                data-bs-auto-close="outside"
                aria-expanded="false">
                <i class="ri-notification-2-line ri-22px"></i>
                <span
                    *ngIf="newNotifications > 0"
                    class="position-absolute top-0 start-50 translate-middle-y badge badge-dot bg-danger mt-2 border"></span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end py-0">
                <li class="dropdown-menu-header border-bottom py-50">
                    <div class="dropdown-header d-flex align-items-center py-2">
                    <h6 class="mb-0 me-auto">Notificaciones</h6>
                    <div class="d-flex align-items-center">
                        <span class="badge rounded-pill bg-label-primary fs-xsmall me-2">{{ newNotifications }} Nuevos</span>
                        <a
                        href="javascript:void(0)"
                        class="btn btn-text-secondary rounded-pill btn-icon dropdown-notifications-all"
                        (click)="markAllAsRead($event)"
                        data-bs-toggle="tooltip"
                        data-bs-placement="top"
                        title="Marcar todas como leídas"
                        ><i class="ri-mail-open-line text-heading ri-20px"></i
                        ></a>
                    </div>
                    </div>
                </li>
                <li class="dropdown-notifications-list scrollable-container" *ngIf="notifications.length > 0">
                    <ul class="list-group list-group-flush">
                        <li
                            class="list-group-item list-group-item-action dropdown-notifications-item"
                            *ngFor="let notification of notifications"
                            (click)="markAsRead(notification.id)"
                            >
                            <div class="d-flex">
                            <div class="flex-shrink-0 me-3">
                                <div class="avatar">
                                <img src="../../assets/img/avatars/1.png" alt class="rounded-circle" />
                                </div>
                            </div>
                            <div class="flex-grow-1">
                                <h6 class="small mb-1">{{ notification.title }}</h6>
                                <small class="mb-1 d-block text-body">{{ notification.message }}</small>
                                <small class="text-muted">{{ notification.createdAt | date:'HH:mm' }}</small>
                            </div>
                            <div class="flex-shrink-0 dropdown-notifications-actions">
                                <a
                                href="javascript:void(0)"
                                class="dropdown-notifications-read"
                                (click)="$event.preventDefault(); $event.stopPropagation(); markAsRead(notification.id)">
                                    <span class="badge badge-dot" *ngIf="!notification.isRead"></span>   
                                </a>
                            </div>
                            </div>
                        </li>
                    </ul>
                </li>
                <li class="border-top">
                    <div class="d-grid p-4">
                    <a class="btn btn-primary btn-sm d-flex" href="javascript:void(0);" (click)="markAllAsRead($event)">
                        <small class="align-middle">Ver todas las notificaciones</small>
                    </a>
                    </div>
                </li>
                </ul>
            </li>
            <!--/ Notification -->

            <!-- User -->
            <li class="nav-item navbar-dropdown dropdown-user dropdown">
                <a class="nav-link dropdown-toggle hide-arrow" href="javascript:void(0);" data-bs-toggle="dropdown">
                <div class="avatar avatar-online">
                    <img src="../../assets/img/avatars/1.png" alt class="rounded-circle" />
                </div>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" href="pages-account-settings-account.html">
                    <div class="d-flex">
                        <div class="flex-shrink-0 me-2">
                        <div class="avatar avatar-online">
                            <img src="../../assets/img/avatars/1.png" alt class="rounded-circle" />
                        </div>
                        </div>
                        <div class="flex-grow-1">
                        <span class="fw-medium d-block small">{{ user?.name }}</span>
                        <small class="text-muted">{{ user?.role?.name }}</small>
                        </div>
                    </div>
                    </a>
                </li>
                <li>
                    <div class="dropdown-divider"></div>
                </li>
                <li>
                    <div class="d-grid px-4 pt-2 pb-1">
                    <a class="btn btn-sm btn-danger d-flex" (click)="logout()" href="javascript:void(0);">
                        <small class="align-middle">Logout</small>
                        <i class="ri-logout-box-r-line ms-2 ri-16px"></i>
                    </a>
                    </div>
                </li>
                </ul>
            </li>
            <!--/ User -->
        </ul>
    </div>
</nav>
